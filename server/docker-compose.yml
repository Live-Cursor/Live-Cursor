version: '3.8'

services:
  live-cursor:
    build: .
    container_name: live-cursor-server
    restart: unless-stopped
    ports:
      - "1234:1234"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    environment:
      - PORT=1234
      - ADMIN_USER=admin
      - ADMIN_PASS=admin
